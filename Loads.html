<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Available Loads — Internal</title>
<meta name="robots" content="noindex,nofollow">
<style>
  :root {
    --bg:#0f1419; --panel:#1a2028; --border:#2a323d; --text:#e6ebf1;
    --muted:#8b97a8; --accent:#f89c1c; --accent2:#3b82f6;
    --good:#22c55e; --warn:#f59e0b; --bad:#ef4444;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
         background:var(--bg); color:var(--text); font-size:14px; }
  header { padding:14px 22px; background:var(--panel); border-bottom:1px solid var(--border);
           display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
  h1 { margin:0; font-size:18px; font-weight:600; }
  .tag { background:var(--accent); color:#000; font-size:11px; font-weight:700;
         padding:2px 7px; border-radius:3px; letter-spacing:0.5px; }
  .meta { color:var(--muted); font-size:12px; }
  .meta strong { color:var(--text); }
  button { background:var(--accent); color:#000; border:0; padding:6px 14px; border-radius:4px;
           cursor:pointer; font-weight:600; font-size:13px; }
  button:hover { background:#ffb84a; }
  button.secondary { background:var(--border); color:var(--text); }
  button.secondary:hover { background:#3a4350; }

  .filters { padding:12px 22px; background:var(--panel); border-bottom:1px solid var(--border);
             display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  .filters label { display:flex; flex-direction:column; gap:3px; font-size:11px; color:var(--muted);
                   text-transform:uppercase; letter-spacing:0.5px; }
  .filters input, .filters select { background:var(--bg); color:var(--text); border:1px solid var(--border);
                                     padding:5px 8px; border-radius:4px; font-size:13px; min-width:110px; }

  .banner { padding:10px 22px; background:#3a2418; color:#fca766; border-bottom:1px solid #5a3a22; display:none; }
  .banner.show { display:block; }

  table { width:100%; border-collapse:collapse; }
  thead th { position:sticky; top:0; background:var(--panel); text-align:left; padding:10px 12px;
             font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted);
             border-bottom:1px solid var(--border); cursor:pointer; user-select:none; white-space:nowrap; }
  thead th:hover { color:var(--text); }
  thead th.sort-asc::after  { content:' ▲'; color:var(--accent); }
  thead th.sort-desc::after { content:' ▼'; color:var(--accent); }
  tbody tr { border-bottom:1px solid var(--border); cursor:pointer; }
  tbody tr:hover { background:#1e252e; }
  tbody tr.expanded { background:#1e252e; }
  td { padding:10px 12px; vertical-align:top; }
  .mono { font-variant-numeric:tabular-nums; }
  .good { color:var(--good); }
  .warn { color:var(--warn); }
  .bad  { color:var(--bad); }
  .pill { display:inline-block; padding:2px 7px; border-radius:10px; font-size:11px;
          background:var(--border); color:var(--text); }

  .detail { background:#141a21; padding:14px 22px; }
  .detail .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; }
  .detail .field { display:flex; flex-direction:column; gap:2px; }
  .detail .field .k { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:0.5px; }
  .detail .field .v { font-size:14px; }
  .detail .actions { margin-top:12px; display:flex; gap:8px; }
  .empty { padding:40px; text-align:center; color:var(--muted); }
  .spin { display:inline-block; width:10px; height:10px; border:2px solid var(--accent);
          border-right-color:transparent; border-radius:50%; animation:s 0.6s linear infinite; }
  @keyframes s { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<header>
  <span class="tag">INTERNAL</span>
  <h1>Available Loads</h1>
  <div class="meta" id="meta">Loading… <span class="spin"></span></div>
  <div style="flex:1"></div>
  <div class="meta">Next auto-refresh: <strong id="countdown">—</strong></div>
  <button id="refresh">Refresh now</button>
</header>

<div class="filters">
  <label>Origin state
    <select id="fState"><option value="">All states</option></select>
  </label>
  <label>Equipment
    <select id="fEquip">
      <option value="">Any</option>
      <option>Flatbed</option><option>Van</option><option>Reefer</option><option>Stepdeck</option>
    </select>
  </label>
  <label>Min rate ($)
    <input type="number" id="fMinRate" min="0" step="50" placeholder="0">
  </label>
  <label>Max deadhead (mi)
    <input type="number" id="fMaxDH" min="0" step="10" placeholder="any">
  </label>
  <label>Pickup from
    <input type="date" id="fFrom">
  </label>
  <label>Pickup to
    <input type="date" id="fTo">
  </label>
  <div style="flex:1"></div>
  <button class="secondary" id="clearFilters">Clear</button>
</div>

<div class="banner" id="banner"></div>

<table id="loadsTable">
  <thead>
    <tr>
      <th data-sort="originState">Origin</th>
      <th data-sort="destState">Dest</th>
      <th data-sort="miles">Miles</th>
      <th data-sort="pickupDate">Pickup</th>
      <th data-sort="rate">Rate</th>
      <th data-sort="rpm">$/mi</th>
      <th data-sort="weight">Weight</th>
      <th data-sort="equipment">Equip</th>
      <th data-sort="deadheadMiles">Deadhead</th>
      <th data-sort="nearestTruck">Nearest Truck</th>
      <th data-sort="brokerName">Broker</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
<div id="empty" class="empty" style="display:none;">No loads match current filters.</div>

<script>
let RAW = [];
let SORT = { key: 'rpm', dir: 'desc' };
let EXPANDED = null;

async function load() {
  const meta = document.getElementById('meta');
  meta.innerHTML = 'Loading… <span class="spin"></span>';
  try {
    const r = await fetch('/api/loads');
    const data = await r.json();
    RAW = (data.loads || []).map(l => ({ ...l, rpm: l.miles ? +(l.rate / l.miles).toFixed(2) : 0, brokerName: l.broker?.name || '' }));
    populateStates(data.operatingStates || []);
    const when = data.cachedAt ? new Date(data.cachedAt).toLocaleString() : '—';
    meta.innerHTML = `<strong>${data.count}</strong> loads · cached <strong>${when}</strong> · source <strong>${data.source}</strong>`;
    startCountdown(data.nextRefresh);
    if (data.source === 'mock') showBanner('Showing mock data — 123Loadboard API credentials pending.');
    render();
  } catch(e) {
    meta.textContent = 'Error loading data';
    showBanner('Failed to load: ' + e.message);
  }
}

function populateStates(states) {
  const sel = document.getElementById('fState');
  if (sel.options.length > 1) return;
  states.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });
}

function showBanner(msg) {
  const b = document.getElementById('banner');
  b.textContent = msg; b.classList.add('show');
}

let countdownTimer = null;
function startCountdown(nextRefreshIso) {
  if (countdownTimer) clearInterval(countdownTimer);
  const target = nextRefreshIso ? new Date(nextRefreshIso).getTime() : Date.now() + 4*3600*1000;
  const el = document.getElementById('countdown');
  function tick() {
    const ms = target - Date.now();
    if (ms <= 0) { el.textContent = 'refreshing…'; load(); return; }
    const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000);
    el.textContent = `${h}h ${m}m`;
  }
  tick(); countdownTimer = setInterval(tick, 30000);
}

function filterRows() {
  const st = document.getElementById('fState').value;
  const eq = document.getElementById('fEquip').value;
  const minR = +document.getElementById('fMinRate').value || 0;
  const maxDH = +document.getElementById('fMaxDH').value || Infinity;
  const from = document.getElementById('fFrom').value;
  const to   = document.getElementById('fTo').value;
  return RAW.filter(l =>
    (!st || l.originState === st) &&
    (!eq || l.equipment === eq) &&
    (l.rate >= minR) &&
    ((l.deadheadMiles ?? 0) <= maxDH) &&
    (!from || l.pickupDate >= from) &&
    (!to   || l.pickupDate <= to)
  );
}

function sortRows(rows) {
  const { key, dir } = SORT;
  const mult = dir === 'asc' ? 1 : -1;
  return rows.slice().sort((a, b) => {
    const av = a[key], bv = b[key];
    if (av == null) return 1; if (bv == null) return -1;
    if (typeof av === 'number') return (av - bv) * mult;
    return String(av).localeCompare(String(bv)) * mult;
  });
}

function render() {
  const rows = sortRows(filterRows());
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  tbody.innerHTML = '';
  empty.style.display = rows.length ? 'none' : 'block';

  // sort indicators
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if (th.dataset.sort === SORT.key) th.classList.add('sort-' + SORT.dir);
  });

  rows.forEach(l => {
    const tr = document.createElement('tr');
    tr.dataset.id = l.id;
    if (EXPANDED === l.id) tr.classList.add('expanded');
    const dhClass = l.deadheadMiles == null ? '' : (l.deadheadMiles < 50 ? 'good' : l.deadheadMiles < 150 ? 'warn' : 'bad');
    tr.innerHTML = `
      <td>${l.originCity}, ${l.originState}</td>
      <td>${l.destCity}, ${l.destState}</td>
      <td class="mono">${l.miles}</td>
      <td class="mono">${l.pickupDate}</td>
      <td class="mono">$${l.rate.toLocaleString()}</td>
      <td class="mono">$${l.rpm.toFixed(2)}</td>
      <td class="mono">${l.weight.toLocaleString()}</td>
      <td><span class="pill">${l.equipment}</span></td>
      <td class="mono ${dhClass}">${l.deadheadMiles != null ? l.deadheadMiles + ' mi' : '—'}</td>
      <td>${l.nearestTruck || '—'}</td>
      <td>${l.broker?.name || '—'}</td>
    `;
    tr.addEventListener('click', () => toggleDetail(l));
    tbody.appendChild(tr);
    if (EXPANDED === l.id) tbody.appendChild(detailRow(l));
  });
}

function detailRow(l) {
  const tr = document.createElement('tr');
  tr.innerHTML = `<td colspan="11" class="detail">
    <div class="grid">
      <div class="field"><div class="k">Load ID</div><div class="v mono">${l.id}</div></div>
      <div class="field"><div class="k">Broker</div><div class="v">${l.broker?.name || '—'}</div></div>
      <div class="field"><div class="k">Broker phone</div><div class="v mono">${l.broker?.phone || '—'}</div></div>
      <div class="field"><div class="k">MC #</div><div class="v mono">${l.broker?.mcNumber || '—'}</div></div>
      <div class="field"><div class="k">Nearest truck</div><div class="v">${l.nearestTruck || '—'}</div></div>
      <div class="field"><div class="k">Deadhead</div><div class="v mono">${l.deadheadMiles != null ? l.deadheadMiles + ' mi' : '—'}</div></div>
    </div>
    <div class="actions">
      <button onclick="copyLoad('${l.id}');event.stopPropagation();">Copy load details</button>
      ${l.broker?.phone ? `<a href="tel:${l.broker.phone.replace(/\\D/g,'')}"><button class="secondary">Call broker</button></a>` : ''}
    </div>
  </td>`;
  return tr;
}

function toggleDetail(l) {
  EXPANDED = EXPANDED === l.id ? null : l.id;
  render();
}

function copyLoad(id) {
  const l = RAW.find(x => x.id === id); if (!l) return;
  const text = [
    `Load ${l.id}`,
    `${l.originCity}, ${l.originState} -> ${l.destCity}, ${l.destState} (${l.miles} mi)`,
    `Pickup ${l.pickupDate} · ${l.equipment} · ${l.weight.toLocaleString()} lbs`,
    `Rate $${l.rate.toLocaleString()} ($${l.rpm.toFixed(2)}/mi)`,
    `Deadhead ${l.deadheadMiles ?? '—'} mi from ${l.nearestTruck || 'n/a'}`,
    `Broker ${l.broker?.name || '—'} · ${l.broker?.phone || '—'} · ${l.broker?.mcNumber || '—'}`,
  ].join('\n');
  navigator.clipboard.writeText(text);
}

document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const k = th.dataset.sort;
    if (SORT.key === k) SORT.dir = SORT.dir === 'asc' ? 'desc' : 'asc';
    else { SORT.key = k; SORT.dir = 'desc'; }
    render();
  });
});

['fState','fEquip','fMinRate','fMaxDH','fFrom','fTo'].forEach(id =>
  document.getElementById(id).addEventListener('input', render));

document.getElementById('clearFilters').addEventListener('click', () => {
  ['fState','fEquip','fMinRate','fMaxDH','fFrom','fTo'].forEach(id => document.getElementById(id).value = '');
  render();
});

document.getElementById('refresh').addEventListener('click', load);

load();
setInterval(load, 4 * 3600 * 1000);
</script>
</body>
</html>
