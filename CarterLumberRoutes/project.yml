name: CarterLumberRoutes
options:
  bundleIdPrefix: com.carterlumber
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    INFOPLIST_KEY_MBXAccessToken: "$(MAPBOX_ACCESS_TOKEN)"

packages:
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    majorVersion: 4.2

targets:
  CarterLumberRoutes:
    type: application
    platform: iOS
    sources:
      - path: CarterLumberRoutes
        excludes:
          - "*.xcassets"
    resources:
      - path: CarterLumberRoutes/Resources/mills.json
      - path: CarterLumberRoutes/Resources/yards.json
      - path: CarterLumberRoutes/Resources/Assets.xcassets
    dependencies:
      - package: KeychainAccess
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.carterlumber.routes
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    info:
      path: CarterLumberRoutes/Info.plist
      properties:
        MBXAccessToken: "$(MAPBOX_ACCESS_TOKEN)"
        NSLocationWhenInUseUsageDescription: "Shows your location on the route map"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true

  CarterLumberRoutesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CarterLumberRoutesTests
    dependencies:
      - target: CarterLumberRoutes
